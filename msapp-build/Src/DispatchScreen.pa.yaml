Screens:
  DispatchScreen:
    Properties:
      Fill: =RGBA(245, 247, 250, 1)
    Children:
      - HeaderLabel:
          Control: Label
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =80
            Text: ="PETRA – Taxi Dispatch"
            Size: =22
            FontWeight: =FontWeight.Bold
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(0, 70, 127, 1)
            Align: =Align.Center
            VerticalAlign: =VerticalAlign.Middle
      - ZoneTitleLabel:
          Control: Label
          Properties:
            X: =40
            Y: =100
            Width: =300
            Height: =36
            Text: ="Abholzone auswählen:"
            Size: =14
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(50, 50, 50, 1)
      - ZoneDropdown:
          Control: Dropdown
          Properties:
            X: =40
            Y: =142
            Width: =300
            Height: =44
            Items: =["E","F","H","I","A","B","C","D","T","G","P","W"]
            OnChange: =Set(gSelectedZone, ZoneDropdown.SelectedText.Value)
            Default: ="E"
      - PassengerLabel:
          Control: Label
          Properties:
            X: =40
            Y: =210
            Width: =300
            Height: =36
            Text: ="Anzahl Passagiere: " & Text(PassengerSlider.Value)
            Size: =14
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(50, 50, 50, 1)
      - PassengerSlider:
          Control: Slider
          Properties:
            X: =40
            Y: =252
            Width: =300
            Height: =44
            Min: =1
            Max: =8
            Default: =1
            OnChange: =Set(gPassengers, PassengerSlider.Value)
      - FindButton:
          Control: Button
          Properties:
            X: =40
            Y: =320
            Width: =300
            Height: =52
            Text: ="🚕 Bestes Taxi finden"
            Size: =15
            FontWeight: =FontWeight.Bold
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(0, 70, 127, 1)
            HoverFill: =RGBA(0, 90, 160, 1)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            OnSelect: |
              =Set(pickupIdx, LookUp(gZoneMap, zone = ZoneDropdown.SelectedText.Value, idx));
              ClearCollect(colScored,
                  AddColumns(
                      Filter(gTaxis, (Capacity - Occupied) >= PassengerSlider.Value),
                      "Score", Abs(LookUp(gZoneMap, zone = Position, idx) - pickupIdx),
                      "FreiePlaetze", Capacity - Occupied
                  )
              );
              Set(gBestTaxi, First(Sort(colScored, Score, SortOrder.Ascending)));
              If(!IsBlank(gBestTaxi),
                  Set(gETA, Round(Abs(LookUp(gZoneMap, zone = gBestTaxi.Position, idx) - pickupIdx) * 0.8 / 30 * 60, 0))
              )
      - ResultCard:
          Control: Rectangle
          Properties:
            X: =40
            Y: =395
            Width: =640
            Height: =180
            Fill: =RGBA(255, 255, 255, 1)
            BorderColor: =RGBA(200, 210, 220, 1)
            BorderThickness: =1
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Visible: =!IsBlank(gBestTaxi)
      - ResultTitleLabel:
          Control: Label
          Properties:
            X: =60
            Y: =410
            Width: =600
            Height: =32
            Text: ="✅ Fahrzeug gefunden"
            Size: =14
            FontWeight: =FontWeight.Bold
            Color: =RGBA(0, 140, 60, 1)
            Visible: =!IsBlank(gBestTaxi)
      - ResultTaxiLabel:
          Control: Label
          Properties:
            X: =60
            Y: =448
            Width: =600
            Height: =30
            Text: ="Fahrzeug: " & gBestTaxi.FunkID & "  |  Position: Zone " & gBestTaxi.Position
            Size: =13
            Color: =RGBA(30, 30, 30, 1)
            Visible: =!IsBlank(gBestTaxi)
      - ResultETALabel:
          Control: Label
          Properties:
            X: =60
            Y: =484
            Width: =600
            Height: =30
            Text: ="ETA: " & Text(gETA) & " Minuten  |  Freie Plätze: " & Text(gBestTaxi.FreiePlaetze)
            Size: =13
            Color: =RGBA(30, 30, 30, 1)
            Visible: =!IsBlank(gBestTaxi)
      - NoTaxiLabel:
          Control: Label
          Properties:
            X: =40
            Y: =395
            Width: =640
            Height: =60
            Text: ="❌ Kein verfügbares Taxi gefunden."
            Size: =14
            Color: =RGBA(200, 30, 30, 1)
            Visible: =IsBlank(gBestTaxi)
      - NavETAButton:
          Control: Button
          Properties:
            X: =40
            Y: =600
            Width: =200
            Height: =44
            Text: ="→ ETA Berechnung"
            Size: =13
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(70, 130, 180, 1)
            HoverFill: =RGBA(90, 150, 200, 1)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            OnSelect: =Navigate(ETAScreen, ScreenTransition.Fade)
      - NavTaxisButton:
          Control: Button
          Properties:
            X: =260
            Y: =600
            Width: =200
            Height: =44
            Text: ="→ Taxi-Status"
            Size: =13
            Color: =RGBA(255, 255, 255, 1)
            Fill: =RGBA(100, 100, 180, 1)
            HoverFill: =RGBA(120, 120, 200, 1)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            OnSelect: =Navigate(TaxiStatusScreen, ScreenTransition.Fade)
